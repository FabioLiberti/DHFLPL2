apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-server
  namespace: federated-learning
  labels:
    app: fl-server
    component: superlink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-server
  template:
    metadata:
      labels:
        app: fl-server
        component: superlink
    spec:
      containers:
        - name: fl-server
          image: dhflpl2/server:latest
          ports:
            - containerPort: 8080
              name: flower
          env:
            - name: FL_SERVER_ADDRESS
              value: "0.0.0.0:8080"
            - name: FL_NUM_ROUNDS
              value: "150"
            - name: FL_MIN_CLIENTS
              value: "2"
            - name: FL_DATASET
              value: "cifar10"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fl-server
  namespace: federated-learning
  labels:
    app: fl-server
spec:
  selector:
    app: fl-server
  ports:
    - port: 8080
      targetPort: 8080
      name: flower
  type: ClusterIP
