version: "3.9"

services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    container_name: fl-server
    ports:
      - "8080:8080"
    environment:
      - FL_SERVER_ADDRESS=0.0.0.0:8080
      - FL_NUM_ROUNDS=150
      - FL_MIN_CLIENTS=2
      - FL_DATASET=cifar10
    networks:
      - fl-network

  client-1:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.client
    container_name: fl-client-1
    environment:
      - FL_SERVER_ADDRESS=server:8080
      - FL_CLIENT_ID=1
      - FL_DATASET=cifar10
      - FL_LOCAL_EPOCHS=1
      - FL_BATCH_SIZE=32
    depends_on:
      - server
    networks:
      - fl-network

  client-2:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.client
    container_name: fl-client-2
    environment:
      - FL_SERVER_ADDRESS=server:8080
      - FL_CLIENT_ID=2
      - FL_DATASET=cifar10
      - FL_LOCAL_EPOCHS=1
      - FL_BATCH_SIZE=32
    depends_on:
      - server
    networks:
      - fl-network

networks:
  fl-network:
    driver: bridge
